services:
  # ─────────────────────────────────────────────
  # NookClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm nookclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  nookclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: nookclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.nookclaw/config.json:ro
      - nookclaw-workspace:/root/.nookclaw/workspace
      - nookclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["nookclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # NookClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  nookclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: nookclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.nookclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - nookclaw-workspace:/root/.nookclaw/workspace
      # NPM cache for faster MCP server installs
      - nookclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  nookclaw-workspace:
  nookclaw-npm-cache: # Cache npm packages to speed up MCP server installations
